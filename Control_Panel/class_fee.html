<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Fee Management System</title>
    <link rel="icon" type="image/x-icon" href="../images/coffee_logo.png">

    <style>
        /* Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 340px;
        }
        h2 {
            text-align: center;
            color: #1f2937;
            margin-top: 0;
        }
        .select-box, .fee-summary, .month-box {
            margin: 15px 0;
        }
        label {
            font-weight: 600;
            font-size: 0.9em;
            color: #4b5563;
        }
        select, .add-fee, .custom-fee-input, .custom-fee-button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            box-sizing: border-box;
            font-size: 14px;
        }
        .fee-summary {
            text-align: center;
            color: #374151;
            padding: 15px;
            background-color: #f9fafb;
            border-radius: 8px;
            border: 1px dashed #d1d5db;
        }
        #calculatedFee {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .add-fee, .custom-fee-button {
            background-color: #10b981;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-fee {
            background-color: #3b82f6;
            margin-top: 20px;
            padding: 12px;
        }
        .add-fee:hover {
            background-color: #2563eb;
        }
        .custom-fee-button:hover {
            background-color: #059669;
        }
        .success-msg {
            font-size: 12px;
            color: #059669;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Fee Management</h2>

        <div class="select-box">
            <label for="grade">Select Grade:</label>
            <select id="grade" onchange="populateStudents()">
                <option value="" disabled selected>Select a grade</option>
            </select>
        </div>

        <div class="select-box">
            <label for="student">Select Student:</label>
            <select id="student" onchange="calculateFee()">
                <option value="" disabled selected>Select a student</option>
            </select>
        </div>

        <div class="fee-summary" id="feeSummary">
            <div id="calculatedFee">Calculated Fee: LKR 0</div>
            <input type="number" class="custom-fee-input" id="customFee" placeholder="Enter custom total fee" />
            <button class="custom-fee-button" onclick="applyCustomFee()">Apply Custom Total Fee</button>
            <div id="feeStatus" class="success-msg">Custom fee applied!</div>
        </div>

        <div class="month-box">
            <label for="month">Select Month:</label>
            <select id="month">
                <option value="" disabled selected>Select a month</option>
                <option>January</option>
                <option>February</option>
                <option>March</option>
                <option>April</option>
                <option>May</option>
                <option>June</option>
                <option>July</option>
                <option>August</option>
                <option>September</option>
                <option>October</option>
                <option>November</option>
                <option>December</option>
            </select>
        </div>

        <button class="add-fee" onclick="generateBill()">Add Fee & Send WhatsApp</button>
    </div>

    <!-- External JavaScript for user data -->
    <script src="../js/user.js"></script>

    <!-- Internal JavaScript -->
    <script>
       const feeRates = { 
            '6-9': 700, 
            '10-11-normal': 800,
            '10-11-paper': 400 
        };

        let currentTotalFee = 0;
        let activeSubjects = [];



        // Initialize UI
        window.onload = () => {
            const userCredentials = typeof credentials !== 'undefined' ? credentials : {};
            const gradeSelect = document.getElementById("grade");
            const grades = [...new Set(Object.values(userCredentials).flatMap(student => student.subjects.map(subject => subject.grade)))].sort((a,b) => a - b);

            grades.forEach(grade => {
                const option = document.createElement("option");
                option.value = grade;
                option.textContent = `Grade ${grade}`;
                gradeSelect.appendChild(option);
            });

            // Set current month as default
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById("month").value = monthNames[new Date().getMonth()];
        };

        function populateStudents() {
            const selectedGrade = parseInt(document.getElementById("grade").value);
            const studentSelect = document.getElementById("student");
            studentSelect.innerHTML = '<option value="" disabled selected>Select a student</option>';

            Object.keys(credentials).forEach(student => {
                const subjects = credentials[student].subjects;
                if (subjects.some(subject => subject.grade === selectedGrade)) {
                    const option = document.createElement("option");
                    option.value = student;
                    option.textContent = student.charAt(0).toUpperCase() + student.slice(1);
                    studentSelect.appendChild(option);
                }
            });
            
            // Reset fee display
            document.getElementById("calculatedFee").textContent = `Calculated Fee: LKR 0`;
            document.getElementById("feeBreakdown").textContent = "";
        }

        function calculateFee() {
            const selectedStudent = document.getElementById("student").value;
            const selectedGrade = parseInt(document.getElementById("grade").value);

            if (!selectedStudent || isNaN(selectedGrade)) return;

            const subjects = credentials[selectedStudent].subjects.filter(subject => subject.grade === selectedGrade);
            activeSubjects = subjects;
            
            let total = 0;
            let breakdown = [];

            subjects.forEach(sub => {
                let cost = 0;
                const subName = sub.name.toLowerCase();

                if (selectedGrade >= 6 && selectedGrade <= 9) {
                    cost = feeRates['6-9'];
                } else if (selectedGrade >= 10 && selectedGrade <= 11) {
                    // Check if it's a paper class
                    if (subName.includes('paper')) {
                        cost = feeRates['10-11-paper']; // 400
                    } else {
                        cost = feeRates['10-11-normal']; // 800
                    }
                }
                
                total += cost;
                breakdown.push(`${sub.name}: ${cost}`);
            });

            currentTotalFee = total;
            document.getElementById("calculatedFee").textContent = `Calculated Fee: LKR ${currentTotalFee}`;
            document.getElementById("feeBreakdown").textContent = breakdown.join(" + ");
            document.getElementById("customFee").value = ''; 
            document.getElementById("feeStatus").style.display = "none";
        }

        function applyCustomFee() {
            const customFeeInput = document.getElementById("customFee").value;
            const customFee = parseInt(customFeeInput);

            if (isNaN(customFee) || customFee < 0) {
                return; // Simple fail silently or UI feedback
            }

            currentTotalFee = customFee;
            document.getElementById("calculatedFee").textContent = `Total Fee (Custom): LKR ${currentTotalFee}`;
            document.getElementById("feeStatus").style.display = "block";
        }

        function saveBillToLocalStorage(billObj) {
            try {
                const history = JSON.parse(localStorage.getItem('paymentHistory') || '[]');
                history.push(billObj);
                localStorage.setItem('paymentHistory', JSON.stringify(history));
            } catch (e) {
                console.error("Storage Error:", e);
            }
        }

        function generateBill() {
            const studentName = document.getElementById("student").value;
            const selectedGrade = document.getElementById("grade").value;
            const selectedMonth = document.getElementById("month").value;

            if (!studentName || !selectedGrade || !selectedMonth) {
                alert("Please select grade, student, and month");
                return;
            }

            const referenceNumber = `REF${Math.floor(100000 + Math.random() * 900000)}`;
            const dateTime = new Date();
            const formattedDateTime = dateTime.toLocaleString();

            const billText = 
`*Learn*
*Geography, History & Civic*
*with Samira sir*

*___Payment Invoice___*

Confirmed Date & Time: ${formattedDateTime}
Name: ${studentName.charAt(0).toUpperCase() + studentName.slice(1)}
Grade: ${selectedGrade}
Subjects: ${activeSubjects.map(s => s.name).join(", ")}
Month: ${selectedMonth}
Paid Fee: LKR ${currentTotalFee}
*Reference Number: ${referenceNumber}*

*Noted With Thanks*`;

            const billObject = {
                name: studentName,
                grade: selectedGrade,
                subjects: activeSubjects.map(s => s.name),
                month: selectedMonth,
                totalFee: currentTotalFee,
                referenceNumber: referenceNumber,
                timestamp: dateTime.getTime(),
                formattedDateTime: formattedDateTime
            };

            saveBillToLocalStorage(billObject);

            // Copy data to clipboard as JSON
            const billString = JSON.stringify(billObject, null, 2) + ",";
            
            // Using modern clipboard API with fallback
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(billString).finally(() => {
                    openWhatsApp(billText);
                });
            } else {
                openWhatsApp(billText);
            }
        }

        function openWhatsApp(text) {
            const whatsappLink = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(whatsappLink, '_blank');
        }
    </script>
</body>
</html>
